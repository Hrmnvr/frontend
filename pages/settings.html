<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Settings - ScholarX</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link rel="stylesheet" href="../styles/shared.css"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#7c70ff",
        "background-light": "#f6f5f8",
        "background-dark": "#110f23",
        "surface-dark": "#1c1a33",
      },
      fontFamily: { "display": ["Lexend", "sans-serif"] },
      borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
    },
  },
}
</script>
</head>
<body class="bg-background-light dark:bg-background-dark text-gray-800 dark:text-gray-100 font-display min-h-screen flex antialiased overflow-hidden">

<!-- Sidebar (injected by JS) -->
<aside class="w-64 h-screen hidden lg:flex flex-col border-r border-gray-200 dark:border-white/5 bg-white dark:bg-[#0d0b1a] shrink-0 sticky top-0 z-30"></aside>

<main class="flex-1 flex flex-col h-screen overflow-hidden relative">
  <!-- Header -->
  <header class="h-20 flex items-center justify-between px-6 lg:px-10 border-b border-gray-200 dark:border-white/5 bg-white/80 dark:bg-[#110f23]/80 backdrop-blur-md sticky top-0 z-20">
    <button class="lg:hidden p-2 -ml-2 text-gray-500 hover:text-primary" data-sidebar-toggle>
      <span class="material-icons-round">menu</span>
    </button>
    <h1 class="text-xl font-bold text-gray-900 dark:text-white">Settings</h1>
    <div class="flex items-center gap-4 ml-auto">
      <div class="flex items-center gap-3 pl-4 border-l border-white/10" id="profileDropdownTrigger">
        <div class="text-right hidden sm:block">
          <p id="userNameDisplay" class="text-sm font-semibold text-gray-900 dark:text-white leading-tight">User</p>
          <p id="userRoleDisplay" class="text-xs text-gray-500 dark:text-gray-400 capitalize">Student</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white font-bold">
          <span id="userInitials">U</span>
        </div>
      </div>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto p-6 lg:p-10">
    <div class="max-w-4xl mx-auto space-y-8">
      
      <!-- Profile Section -->
      <section class="bg-white dark:bg-surface-dark border border-gray-200 dark:border-white/5 rounded-2xl overflow-hidden shadow-sm">
        <div class="p-6 border-b border-gray-100 dark:border-white/5 bg-gray-50/50 dark:bg-white/5">
          <h2 class="text-lg font-bold flex items-center gap-2">
            <span class="material-icons-round text-primary">person</span>
            Profile Information
          </h2>
          <p class="text-sm text-gray-500 mt-1">Manage your basic profile details and preferences.</p>
        </div>
        <div class="p-6 space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-1.5">
              <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider ml-1">Full Name</label>
              <input id="inp-name" type="text" class="w-full bg-gray-100 dark:bg-background-dark border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/50" placeholder="Your name">
            </div>
            <div class="space-y-1.5">
              <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider ml-1">Email Address</label>
              <input id="inp-email" type="email" class="w-full bg-gray-200 dark:bg-background-dark/50 border-none rounded-xl px-4 py-3 text-sm text-gray-500 cursor-not-allowed" disabled>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-1.5">
              <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider ml-1">Grade / Class</label>
              <select id="sel-grade" class="w-full bg-gray-100 dark:bg-background-dark border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/50">
                <option value="" disabled selected>Select grade</option>
                <option value="5">Class 5</option>
                <option value="6">Class 6</option>
                <option value="7">Class 7</option>
                <option value="8">Class 8</option>
                <option value="9">Class 9</option>
                <option value="10">Class 10</option>
                <option value="11">Class 11</option>
                <option value="12">Class 12</option>
                <option value="college">College / University</option>
              </select>
            </div>
            <div class="space-y-1.5">
              <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider ml-1">Board</label>
              <select id="sel-board" class="w-full bg-gray-100 dark:bg-background-dark border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/50">
                <option value="" disabled selected>Select board</option>
                <option value="cbse">CBSE</option>
                <option value="icse">ICSE</option>
                <option value="ib">IB</option>
                <option value="state">State Board</option>
              </select>
            </div>
            <div class="space-y-1.5">
              <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider ml-1">School</label>
              <input id="inp-school" type="text" class="w-full bg-gray-100 dark:bg-background-dark border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/50" placeholder="School name">
            </div>
          </div>
        </div>
        <div class="px-6 py-4 bg-gray-50 dark:bg-white/2 flex justify-end">
          <button id="btn-save-profile" class="bg-primary text-white px-6 py-2.5 rounded-xl font-bold text-sm shadow-lg shadow-primary/25 hover:bg-primary/90 transition-all">
            Save Changes
          </button>
        </div>
      </section>

      <!-- Preferences Section -->
      <section class="bg-white dark:bg-surface-dark border border-gray-200 dark:border-white/5 rounded-2xl overflow-hidden shadow-sm">
        <div class="p-6 border-b border-gray-100 dark:border-white/5 bg-gray-50/50 dark:bg-white/5">
          <h2 class="text-lg font-bold flex items-center gap-2">
            <span class="material-icons-round text-amber-500">settings_suggest</span>
            Account Preferences
          </h2>
        </div>
        <div class="p-6 space-y-4">
          <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-background-dark rounded-xl border border-gray-100 dark:border-white/5">
            <div>
              <p class="font-semibold text-sm">Theme Preference</p>
              <p class="text-xs text-gray-500">Switch between light and dark modes.</p>
            </div>
            <button class="px-4 py-2 bg-white dark:bg-surface-dark rounded-lg text-xs font-bold border border-gray-200 dark:border-white/10 opacity-50 cursor-not-allowed">
              Dark (Auto)
            </button>
          </div>
          <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-background-dark rounded-xl border border-gray-100 dark:border-white/5">
            <div>
              <p class="font-semibold text-sm text-red-500">Danger Zone</p>
              <p class="text-xs text-gray-500">Log out of your account on this device.</p>
            </div>
            <button id="btn-logout" class="px-4 py-2 bg-red-500/10 text-red-500 rounded-lg text-xs font-bold border border-red-500/20 hover:bg-red-500 hover:text-white transition-all">
              Log Out
            </button>
          </div>
        </div>
      </section>

    </div>
    <div class="h-20"></div>
  </div>
</main>

<script type="module">
import { auth, db, initAuth, loadUserProfile, apiCall, logout } from '../js/auth.js';
import { renderSidebar, setupProfileDropdown } from '../js/sidebar.js';
import { showToast, setButtonLoading } from '../js/validation.js';
import { doc, setDoc } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

let currentUser = null;

initAuth(async (user) => {
  currentUser = user;
  
  // Load profile and fill UI
  const userData = await loadUserProfile(user, {
    nameEl: document.getElementById('userNameDisplay'),
    infoEl: document.getElementById('userRoleDisplay'),
  });
  
  // Render Sidebar (detect role)
  const role = userData?.role || localStorage.getItem('user_role') || 'student';
  renderSidebar(role, 'settings.html');
  setupProfileDropdown(user);

  document.getElementById('inp-email').value = user.email || '';
  document.getElementById('userRoleDisplay').textContent = role;

  if (userData) {
    document.getElementById('inp-name').value = userData.displayName || '';
    if (userData.grade) document.getElementById('sel-grade').value = userData.grade;
    if (userData.board) document.getElementById('sel-board').value = userData.board;
    document.getElementById('inp-school').value = userData.school || '';
  }
});

// Save Profile
document.getElementById('btn-save-profile').addEventListener('click', async () => {
  if (!currentUser) return;
  
  const name = document.getElementById('inp-name').value.trim();
  const grade = document.getElementById('sel-grade').value;
  const board = document.getElementById('sel-board').value;
  const school = document.getElementById('inp-school').value.trim();

  if (!name) {
    showToast('Name is required', 'error');
    return;
  }

  const btn = document.getElementById('btn-save-profile');
  setButtonLoading(btn, true, 'Saving...');

  try {
    await setDoc(doc(db, 'users', currentUser.uid), {
      displayName: name,
      grade: grade,
      board: board,
      school: school,
      updatedAt: new Date().toISOString()
    }, { merge: true });

    showToast('Profile updated successfully!', 'success');
    
    // Update header name immediately
    document.getElementById('userNameDisplay').textContent = name;
  } catch (err) {
    console.error('Save error:', err);
    showToast('Failed to save profile:' + err.message, 'error');
  } finally {
    setButtonLoading(btn, false);
  }
});

// Logout
document.getElementById('btn-logout').addEventListener('click', logout);

</script>
</body></html>
