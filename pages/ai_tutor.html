<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI Tutor - ScholarX</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link rel="stylesheet" href="../styles/shared.css"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#7c70ff",
        "background-light": "#f6f5f8",
        "background-dark": "#110f23",
        "surface-dark": "#1c1a33",
        "amber-accent": "#ffb020",
      },
      fontFamily: { "display": ["Lexend", "sans-serif"] },
      borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
    },
  },
}
</script>
<style>/* Styles now in shared.css */</style>
</head>
<body class="bg-background-light dark:bg-background-dark text-gray-800 dark:text-gray-100 font-display min-h-screen flex antialiased selection:bg-primary selection:text-white overflow-hidden">

<!-- Sidebar (injected by JS) -->
<aside class="w-64 h-screen hidden lg:flex flex-col border-r border-gray-200 dark:border-white/5 bg-white dark:bg-[#0d0b1a] shrink-0 sticky top-0 z-30"></aside>

<!-- Main Content -->
<main class="flex-1 flex flex-col h-screen overflow-hidden relative" role="main">

  <!-- Header -->
  <header class="h-16 flex items-center justify-between px-6 lg:px-10 border-b border-gray-200 dark:border-white/5 bg-white/80 dark:bg-[#110f23]/80 backdrop-blur-md sticky top-0 z-20">
    <div class="flex items-center gap-3">
      <button class="lg:hidden p-2 -ml-2 text-gray-500 hover:text-primary" aria-label="Toggle navigation menu" data-sidebar-toggle>
        <span class="material-icons-round">menu</span>
      </button>
      <span class="material-icons-round text-primary text-2xl">psychology</span>
      <h1 class="text-lg font-semibold dark:text-white">AI Tutor</h1>
    </div>
    
    <div id="header-lesson-info" class="hidden md:flex items-center gap-2 text-sm text-gray-400">
      <span id="header-subject" class="px-2 py-1 rounded-full bg-primary/10 text-primary text-xs font-medium"></span>
      <span id="header-chapter" class="truncate max-w-[150px] lg:max-w-[300px]"></span>
    </div>

    <div class="flex items-center gap-4 lg:gap-6 ml-auto">
      <button class="relative p-2 text-gray-400 hover:text-white transition-colors" aria-label="Notifications">
        <span class="material-icons-round">notifications_none</span>
        <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-background-dark"></span>
      </button>
      <div class="flex items-center gap-3 pl-4 border-l border-white/10">
        <div class="text-right hidden sm:block">
          <p id="studentNameDisplay" class="text-sm font-semibold text-gray-900 dark:text-white leading-tight">Student</p>
          <p id="studentGradeDisplay" class="text-xs text-gray-500 dark:text-gray-400 text-right">Loading...</p>
        </div>
        <div id="studentInitials" class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary font-bold text-sm border border-primary/20">
          <span class="material-icons-round">person</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Content Area -->
  <div class="flex-1 overflow-y-auto">

    <!-- STATE 1: Lesson Selection -->
    <div id="state-selection" class="flex items-center justify-center min-h-full p-6">
      <div class="w-full max-w-lg fade-in">
        <!-- Decorative glow -->
        <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>

        <div class="relative glass-panel border border-white/10 rounded-2xl p-8 space-y-6">
          <div class="text-center mb-4">
            <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gradient-to-br from-primary to-purple-600 flex items-center justify-center shadow-lg shadow-primary/30">
              <span class="material-icons-round text-white text-3xl">record_voice_over</span>
            </div>
            <h2 class="text-2xl font-bold dark:text-white">Start a Lesson</h2>
            <p class="text-sm text-gray-400 mt-2">Your AI tutor will teach you any topic with voice</p>
          </div>

          <div class="space-y-4">
            <!-- Board -->
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">Board</label>
              <select id="sel-board" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-sm dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-transparent">
                <option value="cbse">CBSE</option>
                <option value="icse">ICSE</option>
                <option value="state">State Board</option>
                <option value="ib">IB</option>
              </select>
            </div>

            <!-- Grade -->
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">Class / Grade</label>
              <select id="sel-grade" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-sm dark:text-white focus:ring-2 focus:ring-primary/50 focus:border-transparent">
                <option value="8">Class 8</option>
                <option value="9">Class 9</option>
                <option value="10">Class 10</option>
                <option value="11">Class 11</option>
                <option value="12">Class 12</option>
              </select>
            </div>

            <!-- Subject -->
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">Subject</label>
              <input id="inp-subject" type="text" placeholder="e.g. Science, Mathematics, History..." class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-sm dark:text-white placeholder-gray-500 focus:ring-2 focus:ring-primary/50 focus:border-transparent"/>
            </div>

            <!-- Chapter -->
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">Chapter / Topic</label>
              <input id="inp-chapter" type="text" placeholder="e.g. Light - Reflection and Refraction" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-sm dark:text-white placeholder-gray-500 focus:ring-2 focus:ring-primary/50 focus:border-transparent"/>
            </div>
          </div>

          <button id="btn-start" onclick="startLesson()" class="w-full py-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/25 transform transition hover:-translate-y-0.5 flex items-center justify-center gap-2">
            <span class="material-icons-round">play_arrow</span>
            Start Lesson
          </button>

          <!-- Recent lessons -->
          <div id="recent-lessons" class="hidden pt-4 border-t border-white/5">
            <h3 class="text-xs font-medium text-gray-400 mb-3">Recent Lessons</h3>
            <div id="recent-list" class="space-y-2"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- STATE 2: Generating -->
    <div id="state-generating" class="hidden flex items-center justify-center min-h-full p-6">
      <div class="text-center max-w-md fade-in">
        <!-- Animated ring -->
        <div class="relative w-32 h-32 mx-auto mb-8">
          <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-primary via-purple-500 to-transparent p-1 animate-spin-slow">
            <div class="w-full h-full bg-background-dark rounded-full"></div>
          </div>
          <div class="absolute inset-4 rounded-full bg-primary/20 animate-pulse-fast flex items-center justify-center">
            <span class="material-icons-round text-primary text-4xl">psychology</span>
          </div>
        </div>

        <h2 class="text-xl font-bold dark:text-white mb-2">Preparing your lesson...</h2>
        <p id="gen-status" class="text-sm text-gray-400 mb-6">Generating lesson script</p>

        <!-- Progress bar -->
        <div class="w-full h-2 bg-white/5 rounded-full overflow-hidden mb-6">
          <div id="gen-progress-bar" class="progress-shimmer h-full rounded-full transition-all duration-500" style="width: 10%"></div>
        </div>

        <!-- Segment list -->
        <div id="gen-segments" class="space-y-2 text-left"></div>
      </div>
    </div>

    <!-- STATE 3: Lesson Player -->
    <div id="state-player" class="hidden h-full">
      <div class="flex h-full">
        <!-- Left: Audio player & content (70%) -->
        <div class="flex-1 flex flex-col min-w-0 border-r border-white/5">

          <!-- Lesson metadata -->
          <div class="px-6 py-4 border-b border-white/5">
            <h2 id="player-chapter" class="text-lg font-bold dark:text-white"></h2>
            <div class="flex items-center gap-2 mt-1">
              <span id="player-board" class="px-2 py-0.5 text-xs rounded-full bg-primary/10 text-primary font-medium"></span>
              <span id="player-subject" class="text-xs text-gray-400"></span>
            </div>
          </div>

          <!-- Segment timeline -->
          <div class="px-6 py-3 border-b border-white/5 overflow-x-auto">
            <div id="segment-timeline" class="flex items-center gap-1 min-w-max"></div>
          </div>

          <!-- Current segment content -->
          <div class="flex-1 overflow-y-auto px-6 py-6">
            <div id="segment-title" class="text-sm font-medium text-primary mb-2"></div>
            <div id="segment-text" class="text-base leading-relaxed dark:text-gray-200 whitespace-pre-line"></div>

            <!-- Q&A section -->
            <div id="qa-section" class="mt-6 space-y-4"></div>
          </div>

          <!-- Audio controls -->
          <div class="px-6 py-4 border-t border-white/5 bg-[#0d0b1a]">
            <audio id="audio-player" preload="auto"></audio>

            <!-- Audio progress -->
            <div class="flex items-center gap-3 mb-3">
              <span id="audio-current-time" class="text-xs text-gray-400 w-10 text-right">0:00</span>
              <div class="flex-1 h-1.5 bg-white/10 rounded-full cursor-pointer relative group" id="audio-seekbar">
                <div id="audio-progress" class="h-full bg-primary rounded-full transition-all" style="width: 0%"></div>
                <div id="audio-seek-handle" class="absolute top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow opacity-0 group-hover:opacity-100 transition-opacity" style="left: 0%"></div>
              </div>
              <span id="audio-duration" class="text-xs text-gray-400 w-10">0:00</span>
            </div>

            <!-- Control buttons -->
            <div class="flex items-center justify-center gap-6">
              <button onclick="prevSegment()" class="p-2 text-gray-400 hover:text-white transition-colors" title="Previous segment">
                <span class="material-icons-round text-2xl">skip_previous</span>
              </button>
              <button id="btn-play" onclick="togglePlay()" class="w-14 h-14 rounded-full bg-primary hover:bg-primary/90 text-white flex items-center justify-center shadow-lg shadow-primary/30 transition-transform hover:scale-105">
                <span class="material-icons-round text-3xl" id="play-icon">play_arrow</span>
              </button>
              <button onclick="nextSegment()" class="p-2 text-gray-400 hover:text-white transition-colors" title="Next segment">
                <span class="material-icons-round text-2xl">skip_next</span>
              </button>
              <div class="ml-4 flex items-center gap-2">
                <span class="text-xs text-gray-400">Speed</span>
                <select id="speed-select" onchange="changeSpeed(this.value)" class="bg-white/5 border border-white/10 rounded-lg text-xs px-2 py-1 dark:text-white">
                  <option value="0.75">0.75x</option>
                  <option value="1" selected>1x</option>
                  <option value="1.25">1.25x</option>
                  <option value="1.5">1.5x</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: Transcript & Q&A (30%) -->
        <div class="w-[350px] hidden xl:flex flex-col bg-[#0d0b1a]/50">
          <div class="px-4 py-3 border-b border-white/5">
            <h3 class="text-sm font-semibold dark:text-white">Transcript</h3>
          </div>
          <div id="transcript-list" class="flex-1 overflow-y-auto px-4 py-3 space-y-3"></div>

          <!-- Question input -->
          <div class="p-4 border-t border-white/5">
            <div class="relative">
              <input id="question-input" type="text" placeholder="Ask a question..." onkeydown="if(event.key==='Enter')askQuestion()" class="w-full pl-4 pr-12 py-3 bg-white/5 border border-white/10 rounded-xl text-sm dark:text-white placeholder-gray-500 focus:ring-2 focus:ring-primary/50 focus:border-transparent"/>
              <button onclick="askQuestion()" class="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 bg-primary rounded-lg hover:bg-primary/90 transition-colors">
                <span class="material-icons-round text-white text-lg">send</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- STATE 4: Lesson Complete -->
    <div id="state-complete" class="hidden flex items-center justify-center min-h-full p-6">
      <div class="text-center max-w-md fade-in">
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-gradient-to-br from-green-400 to-emerald-600 flex items-center justify-center shadow-lg shadow-green-500/30">
          <span class="material-icons-round text-white text-4xl">check</span>
        </div>
        <h2 class="text-2xl font-bold dark:text-white mb-2">Lesson Complete!</h2>
        <p class="text-gray-400 mb-2">You earned <span class="text-primary font-bold">+30 XP</span></p>
        <p id="complete-summary" class="text-sm text-gray-400 mb-8"></p>
        <div class="flex gap-3 justify-center">
          <button onclick="resetToSelection()" class="px-6 py-3 bg-white/5 border border-white/10 rounded-xl text-sm font-medium hover:bg-white/10 transition-colors">
            <span class="material-icons-round text-sm mr-1 align-middle">add</span> New Lesson
          </button>
          <button onclick="resetToSelection()" class="px-6 py-3 bg-primary hover:bg-primary/90 text-white font-medium rounded-xl shadow-lg shadow-primary/25 transition-colors">
            Back to Tutor
          </button>
        </div>
      </div>
    </div>

  </div>
</main>

<script type="module">
import { auth, db, initAuth, apiCall, loadUserProfile, getAuthToken } from '../js/auth.js';
import { renderSidebar, setupProfileDropdown } from '../js/sidebar.js';
import { showToast, showFieldError, clearFieldError, setButtonLoading, escapeHtml } from '../js/validation.js';

// ============================================================
// State Management
// ============================================================
const state = {
  phase: 'selection',  // selection | generating | playing | complete
  lessonId: null,
  segments: [],
  currentSegment: 0,
  isPlaying: false,
  isPausedForQuestion: false,
};

const audioEl = document.getElementById('audio-player');

// ============================================================
// Initialization & Auth
// ============================================================
initAuth(async (user) => {
  // Render Sidebar
  renderSidebar('student', 'ai_tutor.html');
  
  // Profile dropdown
  setupProfileDropdown(user);

  // Load User Profile Data
  const userData = await loadUserProfile(user);
  if (userData) {
    // Prefill form
    if (userData.board) document.getElementById('sel-board').value = userData.board;
    if (userData.grade) document.getElementById('sel-grade').value = userData.grade;
  }
});

// ============================================================
// Phase transitions
// ============================================================
function showState(name) {
  ['selection', 'generating', 'player', 'complete'].forEach(s => {
    const el = document.getElementById(`state-${s}`);
    if (el) {
       el.classList.toggle('hidden', s !== name);
       if (s === name) el.classList.add('fade-in');
    }
  });
  state.phase = name;
}

// ============================================================
// Start Lesson
// ============================================================
async function startLesson() {
  const board = document.getElementById('sel-board').value;
  const grade = document.getElementById('sel-grade').value;
  const subjectInput = document.getElementById('inp-subject');
  const chapterInput = document.getElementById('inp-chapter');
  
  const subject = subjectInput.value.trim();
  const chapter = chapterInput.value.trim();

  // Validation
  let hasError = false;
  if (!subject) { showFieldError(subjectInput, 'Subject is required'); hasError = true; }
  else { clearFieldError(subjectInput); }
  
  if (!chapter) { showFieldError(chapterInput, 'Chapter/Topic is required'); hasError = true; }
  else { clearFieldError(chapterInput); }

  if (hasError) return;

  const btn = document.getElementById('btn-start');
  setButtonLoading(btn, true, 'Starting...');

  try {
    const data = await apiCall('/tutor/start-lesson', {
      method: 'POST',
      body: JSON.stringify({ board, grade, subject, chapter }),
    });

    state.lessonId = data.lesson_id;
    showState('generating');
    connectSSE(data.lesson_id);

    // Update header
    const infoHeader = document.getElementById('header-lesson-info');
    infoHeader.classList.remove('hidden');
    infoHeader.classList.add('flex');
    document.getElementById('header-subject').textContent = subject;
    document.getElementById('header-chapter').textContent = chapter;

  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    setButtonLoading(btn, false);
  }
}

// ============================================================
// SSE Progress
// ============================================================
async function connectSSE(lessonId) {
  const token = await getAuthToken();
  const url = `${window.location.origin}/api/v1/tutor/start-lesson/${lessonId}/stream?token=${encodeURIComponent(token)}`;

  const evtSource = new EventSource(url);
  const statusEl = document.getElementById('gen-status');
  const progressBar = document.getElementById('gen-progress-bar');

  evtSource.addEventListener('progress', (e) => {
    const data = JSON.parse(e.data);

    if (data.event === 'generating_script') {
      statusEl.textContent = 'AI is writing the lesson script...';
      progressBar.style.width = '20%';
    } else if (data.event === 'generating_audio') {
      const pct = data.total > 0 ? Math.round(20 + (data.current / data.total) * 70) : 50;
      statusEl.textContent = `Generating audio: segment ${data.current} of ${data.total}`;
      progressBar.style.width = pct + '%';
    } else if (data.event === 'ready') {
      statusEl.textContent = 'Lesson ready!';
      progressBar.style.width = '100%';
      evtSource.close();
      loadLesson(lessonId);
    } else if (data.event === 'error') {
      statusEl.textContent = 'Error: ' + (data.message || 'Something went wrong');
      progressBar.style.width = '0%';
      progressBar.classList.remove('progress-shimmer');
      progressBar.classList.add('bg-red-500');
      evtSource.close();
      showToast(data.message || 'Generation failed', 'error');
    }
  });

  evtSource.onerror = () => {
    evtSource.close();
    // Fallback: poll status
    setTimeout(() => pollLessonStatus(lessonId), 2000);
  };
}

async function pollLessonStatus(lessonId) {
  try {
    const lesson = await apiCall(`/tutor/lesson/${lessonId}`);
    if (lesson.status === 'active') {
      loadLesson(lessonId);
    } else if (lesson.status === 'error') {
      document.getElementById('gen-status').textContent = 'Generation failed. Please try again.';
      showToast('Generation failed', 'error');
    } else {
      setTimeout(() => pollLessonStatus(lessonId), 3000);
    }
  } catch {
    setTimeout(() => pollLessonStatus(lessonId), 3000);
  }
}

// ============================================================
// Load & Play Lesson
// ============================================================
async function loadLesson(lessonId) {
  try {
    const lesson = await apiCall(`/tutor/lesson/${lessonId}`);
    state.segments = lesson.segments;
    state.currentSegment = 0;

    // Update player UI metadata
    document.getElementById('player-chapter').textContent = lesson.chapter;
    document.getElementById('player-board').textContent = `${lesson.board} Class ${lesson.grade}`;
    document.getElementById('player-subject').textContent = lesson.subject;

    buildTimeline();
    buildTranscript();
    loadSegment(0);
    showState('player');
  } catch (err) {
    showToast('Failed to load lesson: ' + err.message, 'error');
  }
}

function buildTimeline() {
  const container = document.getElementById('segment-timeline');
  container.innerHTML = '';
  state.segments.forEach((seg, i) => {
    const dot = document.createElement('button');
    dot.className = 'flex flex-col items-center gap-1 group cursor-pointer min-w-[60px]';
    dot.onclick = () => loadSegment(i);
    dot.innerHTML = `
      <div class="w-3 h-3 rounded-full border-2 transition-all ${i === 0 ? 'bg-primary border-primary scale-125' : 'border-white/20 group-hover:border-primary/50'}" data-timeline-dot="${i}"></div>
      <span class="text-[10px] text-gray-500 group-hover:text-gray-300 truncate max-w-[60px]" title="${seg.title}">${seg.title}</span>
    `;
    container.appendChild(dot);

    if (i < state.segments.length - 1) {
      const line = document.createElement('div');
      line.className = 'w-8 h-0.5 bg-white/10 -mt-4';
      container.appendChild(line);
    }
  });
}

function updateTimeline(activeIdx) {
  document.querySelectorAll('[data-timeline-dot]').forEach((dot, i) => {
    if (i < activeIdx) {
      dot.className = 'w-3 h-3 rounded-full border-2 bg-green-500 border-green-500 transition-all';
    } else if (i === activeIdx) {
      dot.className = 'w-3 h-3 rounded-full border-2 bg-primary border-primary scale-125 transition-all';
    } else {
      dot.className = 'w-3 h-3 rounded-full border-2 border-white/20 transition-all';
    }
  });
}

function buildTranscript() {
  const container = document.getElementById('transcript-list');
  container.innerHTML = '';
  state.segments.forEach((seg, i) => {
    const div = document.createElement('div');
    div.className = 'p-3 rounded-xl transition-colors cursor-pointer hover:bg-white/5';
    div.setAttribute('data-transcript', i);
    div.onclick = () => loadSegment(i);
    div.innerHTML = `
      <div class="flex items-center gap-2 mb-1">
        <span class="material-icons-round text-xs ${i === 0 ? 'text-primary' : 'text-gray-500'}">play_circle</span>
        <span class="text-xs font-medium ${i === 0 ? 'text-primary' : 'text-gray-400'}">${seg.title}</span>
        ${seg.duration ? `<span class="ml-auto text-[10px] text-gray-500">${formatTime(seg.duration)}</span>` : ''}
      </div>
      <p class="text-xs text-gray-500 line-clamp-2">${seg.text.substring(0, 120)}...</p>
    `;
    container.appendChild(div);
  });
}

function updateTranscript(activeIdx) {
  document.querySelectorAll('[data-transcript]').forEach((el, i) => {
    const icon = el.querySelector('.material-icons-round');
    const title = el.querySelector('span:nth-child(2)');
    if (i === activeIdx) {
      el.classList.add('bg-primary/5');
      icon.className = 'material-icons-round text-xs text-primary';
      title.className = 'text-xs font-medium text-primary';
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else {
      el.classList.remove('bg-primary/5');
      icon.className = 'material-icons-round text-xs text-gray-500';
      title.className = 'text-xs font-medium text-gray-400';
    }
  });
}

function loadSegment(idx) {
  if (idx < 0 || idx >= state.segments.length) return;
  state.currentSegment = idx;
  const seg = state.segments[idx];

  document.getElementById('segment-title').textContent = `${idx + 1}/${state.segments.length} — ${seg.title}`;
  document.getElementById('segment-text').textContent = seg.text;

  updateTimeline(idx);
  updateTranscript(idx);

  if (seg.audio_url) {
    audioEl.src = `${window.location.origin}${seg.audio_url}`;
    audioEl.load();
    if (state.isPlaying) audioEl.play();
  }
}

// ============================================================
// Audio Controls
// ============================================================
function togglePlay() {
  if (audioEl.paused) {
    audioEl.play().catch(console.error);
    state.isPlaying = true;
    document.getElementById('play-icon').textContent = 'pause';
  } else {
    audioEl.pause();
    state.isPlaying = false;
    document.getElementById('play-icon').textContent = 'play_arrow';
  }
}

function prevSegment() {
  if (state.currentSegment > 0) loadSegment(state.currentSegment - 1);
}

function nextSegment() {
  if (state.currentSegment < state.segments.length - 1) {
    loadSegment(state.currentSegment + 1);
  }
}

function changeSpeed(val) {
  audioEl.playbackRate = parseFloat(val);
}

audioEl.addEventListener('ended', () => {
  if (state.isPausedForQuestion) return;
  if (state.currentSegment < state.segments.length - 1) {
    loadSegment(state.currentSegment + 1);
    audioEl.play();
  } else {
    completeLesson();
  }
});

audioEl.addEventListener('timeupdate', () => {
  if (!audioEl.duration) return;
  const pct = (audioEl.currentTime / audioEl.duration) * 100;
  document.getElementById('audio-progress').style.width = pct + '%';
  document.getElementById('audio-seek-handle').style.left = pct + '%';
  document.getElementById('audio-current-time').textContent = formatTime(audioEl.currentTime);
});

audioEl.addEventListener('loadedmetadata', () => {
  document.getElementById('audio-duration').textContent = formatTime(audioEl.duration);
});

document.getElementById('audio-seekbar').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audioEl.currentTime = pct * audioEl.duration;
});

// ============================================================
// Ask Question
// ============================================================
async function askQuestion() {
  const input = document.getElementById('question-input');
  const question = input.value.trim();
  if (!question) return;

  audioEl.pause();
  state.isPausedForQuestion = true;
  state.isPlaying = false;
  document.getElementById('play-icon').textContent = 'play_arrow';

  input.value = '';
  input.disabled = true;

  const qaSection = document.getElementById('qa-section');
  const qaDiv = document.createElement('div');
  qaDiv.className = 'fade-in space-y-3';
  qaDiv.innerHTML = `
    <div class="flex justify-end">
      <div class="max-w-[80%] px-4 py-2 bg-primary/20 rounded-xl rounded-br-sm">
        <p class="text-sm">${escapeHtml(question)}</p>
      </div>
    </div>
    <div class="flex gap-2">
      <div class="w-6 h-6 rounded-full bg-primary/20 flex items-center justify-center shrink-0 mt-1">
        <span class="material-icons-round text-primary text-xs">psychology</span>
      </div>
      <div class="max-w-[80%] px-4 py-2 bg-white/5 rounded-xl rounded-bl-sm" id="answer-loading">
        <span class="material-icons-round text-sm animate-spin text-gray-400">refresh</span>
        <span class="text-sm text-gray-400 ml-1">Thinking...</span>
      </div>
    </div>
  `;
  qaSection.appendChild(qaDiv);
  qaSection.scrollTop = qaSection.scrollHeight;

  try {
    const result = await apiCall('/tutor/ask', {
      method: 'POST',
      body: JSON.stringify({
        lesson_id: state.lessonId,
        question: question,
        current_segment: state.currentSegment,
      }),
    });

    const loadingEl = document.getElementById('answer-loading');
    if (loadingEl) {
      loadingEl.id = '';
      loadingEl.innerHTML = `<p class="text-sm">${escapeHtml(result.answer)}</p>`;
    }

    if (result.suggested_followups?.length > 0) {
      const followupDiv = document.createElement('div');
      followupDiv.className = 'flex flex-wrap gap-2 mt-2';
      result.suggested_followups.forEach(f => {
        const chip = document.createElement('button');
        chip.className = 'px-3 py-1 text-xs bg-primary/10 text-primary rounded-full hover:bg-primary/20 transition-colors';
        chip.textContent = f;
        chip.onclick = () => { input.value = f; askQuestion(); };
        followupDiv.appendChild(chip);
      });
      qaDiv.appendChild(followupDiv);
    }

    const resumeBtn = document.createElement('button');
    resumeBtn.className = 'mt-3 px-4 py-2 bg-primary/10 text-primary text-sm rounded-xl hover:bg-primary/20 transition-colors flex items-center gap-1';
    resumeBtn.innerHTML = '<span class="material-icons-round text-sm">play_arrow</span> Resume Lesson';
    resumeBtn.onclick = () => {
      state.isPausedForQuestion = false;
      audioEl.play();
      state.isPlaying = true;
      document.getElementById('play-icon').textContent = 'pause';
      resumeBtn.remove();
    };
    qaDiv.appendChild(resumeBtn);

  } catch (err) {
    const loadingEl = document.getElementById('answer-loading');
    if (loadingEl) {
      loadingEl.id = '';
      loadingEl.innerHTML = `<p class="text-sm text-red-400">Failed to get answer. ${err.message}</p>`;
    }
  } finally {
    input.disabled = false;
    input.focus();
  }
}

// ============================================================
// Complete Lesson
// ============================================================
async function completeLesson() {
  try {
    await apiCall(`/tutor/complete/${state.lessonId}`, { method: 'POST' });
  } catch { }

  document.getElementById('complete-summary').textContent =
    `You completed ${state.segments.length} segments on "${document.getElementById('player-chapter').textContent}"`;

  state.isPlaying = false;
  document.getElementById('play-icon').textContent = 'play_arrow';
  showState('complete');
}

function resetToSelection() {
  state.lessonId = null;
  state.segments = [];
  state.currentSegment = 0;
  state.isPlaying = false;
  state.isPausedForQuestion = false;
  audioEl.pause();
  audioEl.src = '';
  document.getElementById('qa-section').innerHTML = '';
  document.getElementById('header-lesson-info').classList.add('hidden');
  showState('selection');
}

function formatTime(seconds) {
  if (!seconds || isNaN(seconds)) return '0:00';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ============================================================
// Global Binds (for onclick)
// ============================================================
window.startLesson = startLesson;
window.togglePlay = togglePlay;
window.prevSegment = prevSegment;
window.nextSegment = nextSegment;
window.changeSpeed = changeSpeed;
window.askQuestion = askQuestion;
window.resetToSelection = resetToSelection;

// ============================================================
// Init
// ============================================================
showState('selection');
</script>

</body>
</html>
