</div>

<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div class="group relative">

</span>
</div>
</div>
<div class="group relative">
<label class="block text-xs font-medium text-gray-400 dark:text-gray-500 mb-1.5 ml-1" for="board">Board</label>
<div class="relative">
<select class="w-full appearance-none bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white rounded-lg py-3.5 pl-4 pr-10 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all cursor-pointer" id="board">
<option disabled="" selected="" value="">Select Board</option>
<option value="cbse">CBSE</option>
<option value="icse">ICSE</option>

</select>
<span class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none text-gray-400">
<span class="material-icons text-[20px]">expand_more</span>
</span>
</div>
</div>
</div>
<div class="group">
<label class="block text-xs font-medium text-gray-400 dark:text-gray-500 mb-1.5 ml-1" for="schoolName">School Name</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
<span class="material-icons text-[20px]">school</span>
</span>
<input class="w-full bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white rounded-lg py-3.5 pl-11 pr-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder-gray-400 dark:placeholder-gray-600" id="schoolName" placeholder="Enter your school name" type="text"/>
</div>
</div>
<div class="group">
<label class="block text-xs font-medium text-gray-400 dark:text-gray-500 mb-2 ml-1" for="subjects">Preferred Subjects</label>
<div class="relative mb-3">
<span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
<span class="material-icons text-[20px]">search</span>
</span>
<input class="w-full bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-900 dark:text-white rounded-lg py-2.5 pl-11 pr-10 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder-gray-400 dark:placeholder-gray-600 text-sm" id="subjects" placeholder="Add more subjects..." type="text"/>
<button class="absolute inset-y-0 right-2 flex items-center text-primary hover:text-white transition-colors" type="button">
<span class="material-icons text-[20px]">add_circle</span>
</button>
</div>
<div class="flex flex-wrap gap-2">
<div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-accent-primary-dim border border-primary/30 text-primary text-xs font-medium transition-all group/chip cursor-pointer hover:bg-primary hover:text-white">
<span>Physics</span>

</div>
<div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-accent-primary-dim border border-primary/30 text-primary text-xs font-medium transition-all group/chip cursor-pointer hover:bg-primary hover:text-white">
<span>Mathematics</span>
<span class="material-icons text-[14px] opacity-70 group-hover/chip:opacity-100">close</span>
</div>
<div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-gray-100 dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-600 dark:text-gray-300 text-xs font-medium transition-all cursor-pointer hover:border-primary hover:text-primary">
<span>Chemistry</span>
<span class="material-icons text-[14px] opacity-0 group-hover:opacity-100">add</span>
</div>
<div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-gray-100 dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-600 dark:text-gray-300 text-xs font-medium transition-all cursor-pointer hover:border-primary hover:text-primary">
<span>Biology</span>
<span class="material-icons text-[14px] opacity-0 group-hover:opacity-100">add</span>
</div>
<div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-gray-100 dark:bg-white/5 border border-gray-200 dark:border-white/10 text-gray-600 dark:text-gray-300 text-xs font-medium transition-all cursor-pointer hover:border-primary hover:text-primary">
<span>Computer Science</span>
<span class="material-icons text-[14px] opacity-0 group-hover:opacity-100">add</span>
</div>
</div>

<div class="pt-2 space-y-3">
<button id="completeSetupBtn" class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-4 rounded-full transition-all shadow-[0_4px_14px_0_rgba(124,112,255,0.39)] hover:shadow-[0_6px_20px_rgba(124,112,255,0.23)] hover:-translate-y-0.5 active:translate-y-0" type="button">
                    Complete Setup
                </button>
<button id="skipBtn" class="w-full bg-transparent hover:bg-white/5 text-gray-500 dark:text-gray-400 hover:text-white font-medium py-3 rounded-full transition-colors" type="button">
                    Skip for now
                </button>

</form>

<div class="fixed bottom-8 right-8 hidden lg:block opacity-30 pointer-events-none w-64 h-64 mix-blend-overlay">
<img alt="Abstract futuristic 3d shapes dark background" class="w-full h-full object-cover rounded-full blur-xl" data-alt="Abstract dark futuristic geometric shapes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAf9fLS_HPlSeenO49MfeMBgsZVwYil3xMQ7qjWh708WliD0DzdfAnTUIWslW7UTDKPXlgGTYfF26sug-DAvbdTnDK_4gpUU6AGjYflFt76oLGosiJaM8k8_FKvteZlwBTLwRwoFJTaI4T-EaXET5tBhCmmPzDB4EBfE0pAxdBHWz39TWDDIJ8Atu6JfH6PBrxHQBwPTe1Q25gi3Qu7hnMH9-8x7728AxxCaLHc-XtTRZyzflrZyhzsNjM1Q5PjnLAVWouiMc0uCq72"/>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';
    import { FIREBASE_CONFIG } from '../js/config.js';
    import { showToast, setButtonLoading, showFieldError, clearFieldError, validateRequired } from '../js/validation.js';

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
    });

    // Avatar Upload with validation
    const avatarInput = document.querySelector('input[aria-label="Upload Avatar"]');
    const avatarContainer = avatarInput?.closest('.relative');

    if (avatarInput) {
        avatarInput.setAttribute('accept', 'image/jpeg,image/png');
        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Validate type
            if (!['image/jpeg', 'image/png'].includes(file.type)) {
                showToast('Please upload a JPG or PNG image', 'error');
                avatarInput.value = '';
                return;
            }

            // Validate size (max 2MB)
            if (file.size > 2 * 1024 * 1024) {
                showToast('Image must be under 2MB', 'error');
                avatarInput.value = '';
                return;
            }

            // Show preview
            const reader = new FileReader();
            reader.onload = (ev) => {
                const container = avatarInput.closest('.overflow-hidden');
                if (container) {
                    container.innerHTML = `<img src="${ev.target.result}" class="w-full h-full object-cover" alt="Avatar preview"/>`;
                    container.appendChild(avatarInput);
                }
            };
            reader.readAsDataURL(file);
        });
    }

    // Subject Tag Management
    const subjectsContainer = document.querySelector('.flex.flex-wrap.gap-2');
    const subjectsInput = document.getElementById('subjects');
    const addSubjectBtn = subjectsInput?.nextElementSibling;

    function getSelectedSubjects() {
        const chips = subjectsContainer.querySelectorAll('.bg-accent-primary-dim span:first-child');
        return Array.from(chips).map(s => s.textContent.trim());
    }

    function createChip(subjectName) {
        const chip = document.createElement('div');
        chip.className = 'inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-accent-primary-dim border border-primary/30 text-primary text-xs font-medium transition-all group/chip cursor-pointer hover:bg-primary hover:text-white';
        chip.innerHTML = `
            <span>${subjectName}</span>
            <span class="material-icons text-[14px] opacity-70 group-hover/chip:opacity-100 remove-chip">close</span>
        `;
        chip.querySelector('.remove-chip').addEventListener('click', (e) => {
             e.stopPropagation();
             chip.remove();
        });
        chip.addEventListener('click', () => chip.remove());
        return chip;
    }

    function addSubject() {
        const val = subjectsInput.value.trim();
        if (val) {
            subjectsContainer.appendChild(createChip(val));
            subjectsInput.value = '';
        }
    }

    if (subjectsInput) {
        subjectsInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addSubject();
            }
        });
    }

    if (addSubjectBtn) addSubjectBtn.addEventListener('click', addSubject);

    // Make suggested subject chips clickable to toggle selection
    document.querySelectorAll('.flex.flex-wrap.gap-2 > div').forEach(chip => {
        chip.addEventListener('click', () => {
            const isSelected = chip.classList.contains('bg-accent-primary-dim');
            if (isSelected) {
                chip.remove();
            } else {
                const name = chip.querySelector('span')?.textContent.trim();
                if (name) {
                    chip.remove();
                    subjectsContainer.appendChild(createChip(name));
                }
            }
        });
    });

    // Complete Setup with validation
    document.getElementById('completeSetupBtn').addEventListener('click', async () => {
        const fullNameInput = document.getElementById('fullName');
        const gradeInput = document.getElementById('grade');
        const boardInput = document.getElementById('board');
        const fullName = fullNameInput.value.trim();
        const grade = gradeInput.value;
        const board = boardInput.value;
        const school = document.getElementById('schoolName').value.trim();
        const subjects = getSelectedSubjects();

        // Validate
        let hasError = false;

        const nameError = validateRequired(fullName, 'Full name');
        if (nameError) { showFieldError(fullNameInput, nameError); hasError = true; }
        else clearFieldError(fullNameInput);

        if (!grade) { showFieldError(gradeInput, 'Please select a grade'); hasError = true; }
        else clearFieldError(gradeInput);

        if (!board) { showFieldError(boardInput, 'Please select a board'); hasError = true; }
        else clearFieldError(boardInput);

        if (hasError) return;

        const btn = document.getElementById('completeSetupBtn');
        setButtonLoading(btn, true, 'Saving...');

        // Save to localStorage
        localStorage.setItem('user_name', fullName);
        localStorage.setItem('user_grade', grade);
        localStorage.setItem('user_board', board);
        localStorage.setItem('user_school', school);

        if (currentUser) {
            try {
                // Fetch existing role if not in localStorage
                let role = localStorage.getItem('user_role');
                if (!role) {
                    const docSnap = await getDoc(doc(db, "users", currentUser.uid));
                    if (docSnap.exists()) {
                        role = docSnap.data().role || docSnap.data().accountType;
                    }
                }
                role = role || 'student'; // Absolute fallback

                await setDoc(doc(db, "users", currentUser.uid), {
                    displayName: fullName,
                    grade: grade,
                    board: board,
                    school: school,
                    subjects: subjects,
                    role: role,
                    accountType: role,
                    profileCompleted: true,
                    updatedAt: new Date().toISOString()
                }, { merge: true });

                setTimeout(() => {
                    window.location.href = role === 'teacher' ? 'teacher_dashboard.html' : 'student_dashboard.html';
                }, 500);
            } catch (e) {
                console.error("Error saving profile:", e);
                showToast('Profile saved locally. Will sync when online.', 'info');
                
                // Fallback redirect even on error
                const role = localStorage.getItem('user_role') || 'student';
                setTimeout(() => {
                    window.location.href = role === 'teacher' ? 'teacher_dashboard.html' : 'student_dashboard.html';
                }, 1000);
            }
        }
    });

    document.getElementById('skipBtn').addEventListener('click', async () => {
        let role = localStorage.getItem('user_role');
        if (!role && currentUser) {
            const docSnap = await getDoc(doc(db, "users", currentUser.uid));
            if (docSnap.exists()) {
                role = docSnap.data().role || docSnap.data().accountType;
            }
        }
        role = role || 'student';
        window.location.href = role === 'teacher' ? 'teacher_dashboard.html' : 'student_dashboard.html';
    });
</script>
</body></html>
