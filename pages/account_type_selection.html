<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ScholarX - Account Selection</title>
<!-- Google Fonts: Lexend -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<link rel="stylesheet" href="../styles/shared.css"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7c70ff",
                        "background-light": "#f6f5f8",
                        "background-dark": "#110f23",
                        "custom-dark": "#0A0A0F", // Specific background requested
                        "surface-dark": "#16161f", // Slightly lighter for cards
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                    boxShadow: {
                        'glow': '0 0 20px rgba(124, 112, 255, 0.15)',
                        'glow-hover': '0 10px 40px rgba(124, 112, 255, 0.25)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0A0A0F;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        /* Smooth fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }
        
        /* Card Selection - checked state for nested elements */
        input[name="account_type"]:checked ~ .role-card .choose-btn {
            background-color: #7c70ff;
            color: white;
            border-color: #7c70ff;
        }
        input[name="account_type"]:checked ~ .checkmark {
            opacity: 1;
            transform: scale(1);
            background-color: #7c70ff;
            border-color: #7c70ff;
        }
    </style>
</head>
<body class="bg-custom-dark font-display text-white h-screen overflow-hidden flex flex-col items-center justify-center selection:bg-primary selection:text-white">
<!-- Background decorative elements -->
<div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Main Content Container -->
<main class="w-full max-w-5xl px-6 relative z-10 flex flex-col items-center">
<!-- Progress Steps -->
<div class="flex items-center space-x-3 mb-12 animate-fade-in" style="animation-delay: 0.1s;">
<div class="w-3 h-3 rounded-full bg-primary shadow-glow"></div>
<div class="w-3 h-3 rounded-full bg-white/10"></div>
</div>
<!-- Header Section -->
<div class="text-center mb-16 animate-fade-in" style="animation-delay: 0.2s;">
<h1 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight">Who are you?</h1>
<p class="text-white/50 text-lg font-light max-w-lg mx-auto">Select your role to personalize your ScholarX learning experience.</p>
</div>
<!-- Cards Container -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl mb-12">
<!-- Student Card -->
<label class="group relative cursor-pointer animate-fade-in" style="animation-delay: 0.3s;">
<input class="peer sr-only" name="account_type" type="radio" value="student"/>
<div class="role-card h-full p-8 md:p-10 rounded-lg bg-surface-dark border border-white/5 hover:border-primary/50 transition-all duration-300 ease-out hover:-translate-y-2 hover:shadow-glow-hover peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary peer-checked:bg-primary/5 peer-checked:shadow-glow flex flex-col items-center text-center">
<!-- Icon Container -->
<div class="w-24 h-24 rounded-full bg-gradient-to-br from-primary/20 to-primary/5 flex items-center justify-center mb-8 group-hover:scale-110 transition-transform duration-300 border border-white/5 group-hover:border-primary/30">
<svg class="w-10 h-10 text-primary" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 14l9-5-9-5-9 5 9 5z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
<path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
<h3 class="text-2xl font-semibold mb-3 text-white group-hover:text-primary transition-colors">Student</h3>
<p class="text-white/60 text-sm leading-relaxed mb-8 font-light">
                        Unlock AI-powered tutoring, practice infinite quizzes, and track your academic growth.
                    </p>
<div class="choose-btn mt-auto px-6 py-2 rounded-full border border-white/10 text-sm font-medium text-white/80 group-hover:bg-primary group-hover:text-white group-hover:border-primary transition-all duration-300">
                        Choose Student
                    </div>
</div>
<!-- Checkmark for active state (sibling of input for peer-checked to work) -->
<div class="checkmark absolute top-6 right-6 w-6 h-6 rounded-full border border-white/20 flex items-center justify-center opacity-0 transition-all duration-300 transform scale-50 z-10">
<svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
</div>
</label>
<!-- Teacher Card -->
<label class="group relative cursor-pointer animate-fade-in" style="animation-delay: 0.4s;">
<input class="peer sr-only" name="account_type" type="radio" value="teacher"/>
<div class="role-card h-full p-8 md:p-10 rounded-lg bg-surface-dark border border-white/5 hover:border-primary/50 transition-all duration-300 ease-out hover:-translate-y-2 hover:shadow-glow-hover peer-checked:border-primary peer-checked:ring-1 peer-checked:ring-primary peer-checked:bg-primary/5 peer-checked:shadow-glow flex flex-col items-center text-center">
<!-- Icon Container -->
<div class="w-24 h-24 rounded-full bg-gradient-to-br from-primary/20 to-primary/5 flex items-center justify-center mb-8 group-hover:scale-110 transition-transform duration-300 border border-white/5 group-hover:border-primary/30">
<svg class="w-10 h-10 text-primary" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</div>
<h3 class="text-2xl font-semibold mb-3 text-white group-hover:text-primary transition-colors">Teacher</h3>
<p class="text-white/60 text-sm leading-relaxed mb-8 font-light">
                        Create comprehensive assignments, monitor class performance, and automate grading with AI.
                    </p>
<div class="choose-btn mt-auto px-6 py-2 rounded-full border border-white/10 text-sm font-medium text-white/80 group-hover:bg-primary group-hover:text-white group-hover:border-primary transition-all duration-300">
                        Choose Teacher
                    </div>
</div>
<!-- Checkmark for active state (sibling of input for peer-checked to work) -->
<div class="checkmark absolute top-6 right-6 w-6 h-6 rounded-full border border-white/20 flex items-center justify-center opacity-0 transition-all duration-300 transform scale-50 z-10">
<svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></path>
</svg>
</div>
</label>
</div>
<!-- Action Area -->
<div class="w-full flex justify-center animate-fade-in" style="animation-delay: 0.5s;">
<button id="continueBtn" class="bg-primary text-white font-semibold py-4 px-12 rounded-full shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:scale-105 active:scale-95 transition-all duration-300 min-w-[200px] flex items-center justify-center gap-2 group">
<span>Continue</span>
<svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</main>
<!-- Subtle Footer Text -->
<div class="absolute bottom-8 text-white/30 text-xs font-light tracking-wide">
        ScholarX Platform &copy; <span id="footerYear"></span>
    </div>
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';
    import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';
    import { FIREBASE_CONFIG } from '../js/config.js';
    import { showToast, setButtonLoading } from '../js/validation.js';

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Dynamic footer year
    const fy = document.getElementById('footerYear');
    if (fy) fy.textContent = new Date().getFullYear();

    let currentUser = null;
    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            // Check if role already exists
            const docSnap = await getDoc(doc(db, "users", user.uid));
            if (docSnap.exists()) {
                const data = docSnap.data();
                const role = data.role || data.accountType;
                if (role) {
                    localStorage.setItem('user_role', role);
                    if (data.profileCompleted) {
                        window.location.href = role === 'teacher' ? 'teacher_dashboard.html' : 'student_dashboard.html';
                    } else {
                        window.location.href = 'profile_setup.html';
                    }
                }
            }
        }
    });

    document.getElementById('continueBtn').addEventListener('click', async () => {
        const selected = document.querySelector('input[name="account_type"]:checked');
        if (!selected) {
            showToast('Please select an account type to continue.', 'error');
            return;
        }

        const role = selected.value;
        localStorage.setItem('user_role', role);

        const btn = document.getElementById('continueBtn');
        setButtonLoading(btn, true, 'Setting up...');

        // Save role to Firestore immediately
        if (currentUser) {
            try {
                await setDoc(doc(db, "users", currentUser.uid), {
                    accountType: role,
                    role: role,
                    email: currentUser.email || '',
                    displayName: currentUser.displayName || '',
                    photoURL: currentUser.photoURL || '',
                    xp: 0,
                    level: 1,
                    streakDays: 0,
                    badges: [],
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                }, { merge: true });
            } catch (e) {
                console.error('Error saving role:', e);
            }
        }

        window.location.href = 'profile_setup.html';
    });
</script>
</body></html>
